name: Deploy TravelAI Agent

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Import check
        working-directory: apps/api
        env:
          STORAGE_BACKEND: dynamo
          LEADS_TABLE: travel-ai-leads-dev
          BOOKINGS_TABLE: travel-ai-bookings-dev
          SESSIONS_TABLE: travel-ai-sessions-dev
          EVENTS_TABLE: travel-ai-events-dev
          PRICE_ALERTS_TABLE: travel-ai-price-alerts-dev
          REFERRALS_TABLE: travel-ai-referrals-dev
          ITINERARIES_TABLE: travel-ai-itineraries-dev
          CONVERSATIONS_TABLE: travel-ai-conversations-dev
        run: python -c "from app.main import app; print('OK', app.title)"

  deploy-backend:
    name: Deploy Backend (SAM)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Build
        run: |
          cd infrastructure
          sam build

      - name: SAM Deploy
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          DUFFEL_API_TOKEN: ${{ secrets.DUFFEL_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          cd infrastructure
          sam deploy \
            --config-env prod \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
            "Environment=prod \
            OpenAiApiKey=${OPENAI_API_KEY:-} \
            VapiApiKey=${VAPI_API_KEY:-} \
            VapiAssistantId=${VAPI_ASSISTANT_ID:-} \
            DuffelApiToken=${DUFFEL_API_TOKEN:-} \
            StripeSecretKey=${STRIPE_SECRET_KEY:-} \
            StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET:-} \
            RazorpayKeyId=${RAZORPAY_KEY_ID:-} \
            RazorpayKeySecret=${RAZORPAY_KEY_SECRET:-} \
            WhatsappAccessToken=${WHATSAPP_ACCESS_TOKEN:-} \
            WhatsappPhoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:-} \
            TwilioAccountSid=${TWILIO_ACCOUNT_SID:-} \
            TwilioAuthToken=${TWILIO_AUTH_TOKEN:-} \
            SmtpPassword=${SMTP_PASSWORD:-}"

      - name: Fetch CloudFormation Outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name travel-ai-prod \
            --query "Stacks[0].Outputs" \
            --output json
