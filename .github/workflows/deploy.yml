name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: me-central-1
  AWS_DEFAULT_REGION: me-central-1
  # Prevent org/repo Variables from injecting a stale session token with permanent keys
  AWS_SESSION_TOKEN: ""

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Import check
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://travel:travel@localhost:5432/travel_ai
          DATABASE_URL_SYNC: postgresql://travel:travel@localhost:5432/travel_ai
          REDIS_URL: redis://localhost:6379/0
        run: python -c "from app.main import app; print('OK', app.title)"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # Do NOT use aws-actions/configure-aws-credentials — it fails when a stale
      # AWS_SESSION_TOKEN exists at org/repo level. Set permanent keys directly.
      - name: Setup AWS credentials
        shell: bash
        env:
          SECRET_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_SESSION: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          set -euo pipefail

          unset AWS_SESSION_TOKEN AWS_SECURITY_TOKEN
          export AWS_SESSION_TOKEN=""
          export AWS_SECURITY_TOKEN=""

          KEY_ID="$(printf '%s' "${SECRET_KEY_ID}" | tr -d '[:space:]')"
          ACCESS_KEY="$(printf '%s' "${SECRET_ACCESS_KEY}" | tr -d '[:space:]')"
          SESSION="$(printf '%s' "${SECRET_SESSION}" | tr -d '[:space:]')"

          if [[ -z "${KEY_ID}" || -z "${ACCESS_KEY}" ]]; then
            echo "::error::GitHub secrets missing. Add exactly:"
            echo "  AWS_ACCESS_KEY_ID"
            echo "  AWS_SECRET_ACCESS_KEY"
            echo "Repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

          echo "Access key prefix: ${KEY_ID:0:4}*** (length ${#KEY_ID})"

          if [[ "${KEY_ID}" == ASIA* ]]; then
            if [[ -z "${SESSION}" ]]; then
              echo "::error::Temporary AWS key (ASIA*) detected — also set AWS_SESSION_TOKEN secret."
              exit 1
            fi
            echo "AWS_SESSION_TOKEN=${SESSION}" >> "$GITHUB_ENV"
          fi

          {
            echo "AWS_ACCESS_KEY_ID=${KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${ACCESS_KEY}"
            echo "AWS_DEFAULT_REGION=${AWS_REGION}"
            echo "AWS_REGION=${AWS_REGION}"
          } >> "$GITHUB_ENV"

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: aws-actions/setup-sam@v2

      - name: SAM build and deploy
        working-directory: infrastructure
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          DUFFEL_API_TOKEN: ${{ secrets.DUFFEL_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --config-env prod \
            --parameter-overrides \
            "Environment=prod \
            OpenAiApiKey=${OPENAI_API_KEY:-} \
            VapiApiKey=${VAPI_API_KEY:-} \
            VapiAssistantId=${VAPI_ASSISTANT_ID:-} \
            DuffelApiToken=${DUFFEL_API_TOKEN:-} \
            StripeSecretKey=${STRIPE_SECRET_KEY:-} \
            StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET:-} \
            RazorpayKeyId=${RAZORPAY_KEY_ID:-} \
            RazorpayKeySecret=${RAZORPAY_KEY_SECRET:-} \
            WhatsappAccessToken=${WHATSAPP_ACCESS_TOKEN:-} \
            WhatsappPhoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:-} \
            TwilioAccountSid=${TWILIO_ACCOUNT_SID:-} \
            TwilioAuthToken=${TWILIO_AUTH_TOKEN:-} \
            SmtpPassword=${SMTP_PASSWORD:-}"
