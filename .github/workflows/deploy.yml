name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: me-central-1
  AWS_DEFAULT_REGION: me-central-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Import check
        working-directory: apps/api
        env:
          STORAGE_BACKEND: dynamo
          LEADS_TABLE: travel-ai-leads-dev
          BOOKINGS_TABLE: travel-ai-bookings-dev
          SESSIONS_TABLE: travel-ai-sessions-dev
          EVENTS_TABLE: travel-ai-events-dev
          PRICE_ALERTS_TABLE: travel-ai-price-alerts-dev
          REFERRALS_TABLE: travel-ai-referrals-dev
          ITINERARIES_TABLE: travel-ai-itineraries-dev
          CONVERSATIONS_TABLE: travel-ai-conversations-dev
        run: python -c "from app.main import app; print('OK', app.title)"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ACCESS_KEY_ID}" || -z "${AWS_SECRET_ACCESS_KEY}" ]]; then
            echo "::error::Add GitHub secrets: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${AWS_REGION}" >> "$GITHUB_ENV"
          echo "AWS_REGION=${AWS_REGION}" >> "$GITHUB_ENV"

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: aws-actions/setup-sam@v2

      - name: SAM build and deploy
        working-directory: infrastructure
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          DUFFEL_API_TOKEN: ${{ secrets.DUFFEL_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --config-env prod \
            --parameter-overrides \
            "Environment=prod \
            OpenAiApiKey=${OPENAI_API_KEY:-} \
            VapiApiKey=${VAPI_API_KEY:-} \
            VapiAssistantId=${VAPI_ASSISTANT_ID:-} \
            DuffelApiToken=${DUFFEL_API_TOKEN:-} \
            StripeSecretKey=${STRIPE_SECRET_KEY:-} \
            StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET:-} \
            RazorpayKeyId=${RAZORPAY_KEY_ID:-} \
            RazorpayKeySecret=${RAZORPAY_KEY_SECRET:-} \
            WhatsappAccessToken=${WHATSAPP_ACCESS_TOKEN:-} \
            WhatsappPhoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:-} \
            TwilioAccountSid=${TWILIO_ACCOUNT_SID:-} \
            TwilioAuthToken=${TWILIO_AUTH_TOKEN:-} \
            SmtpPassword=${SMTP_PASSWORD:-}"
