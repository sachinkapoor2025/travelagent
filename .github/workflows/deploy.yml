name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: me-central-1

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Import check
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://travel:travel@localhost:5432/travel_ai
          DATABASE_URL_SYNC: postgresql://travel:travel@localhost:5432/travel_ai
          REDIS_URL: redis://localhost:6379/0
        run: python -c "from app.main import app; print('OK', app.title)"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # Permanent IAM keys (AKIA...) must NOT send a session token.
      # Clear any org/repo-level AWS_SESSION_TOKEN that causes "invalid security token".
      - name: Clear stale session token
        run: |
          echo "AWS_ACCESS_KEY_ID prefix: ${AWS_ACCESS_KEY_ID:0:4}***"
          if [[ "${AWS_ACCESS_KEY_ID}" == ASIA* ]]; then
            echo "::error::AWS_ACCESS_KEY_ID starts with ASIA — that is a temporary key and requires AWS_SESSION_TOKEN."
            exit 1
          fi
          if [[ -z "${AWS_ACCESS_KEY_ID}" || -z "${AWS_SECRET_ACCESS_KEY}" ]]; then
            echo "::error::Set GitHub secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (Repository → Settings → Secrets)."
            exit 1
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
        env:
          AWS_SESSION_TOKEN: ""

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - uses: aws-actions/setup-sam@v2

      - name: SAM build and deploy
        working-directory: infrastructure
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
          DUFFEL_API_TOKEN: ${{ secrets.DUFFEL_API_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --config-env prod \
            --parameter-overrides \
            "Environment=prod \
            OpenAiApiKey=${OPENAI_API_KEY:-} \
            VapiApiKey=${VAPI_API_KEY:-} \
            VapiAssistantId=${VAPI_ASSISTANT_ID:-} \
            DuffelApiToken=${DUFFEL_API_TOKEN:-} \
            StripeSecretKey=${STRIPE_SECRET_KEY:-} \
            StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET:-} \
            RazorpayKeyId=${RAZORPAY_KEY_ID:-} \
            RazorpayKeySecret=${RAZORPAY_KEY_SECRET:-} \
            WhatsappAccessToken=${WHATSAPP_ACCESS_TOKEN:-} \
            WhatsappPhoneNumberId=${WHATSAPP_PHONE_NUMBER_ID:-} \
            TwilioAccountSid=${TWILIO_ACCOUNT_SID:-} \
            TwilioAuthToken=${TWILIO_AUTH_TOKEN:-} \
            SmtpPassword=${SMTP_PASSWORD:-}"
