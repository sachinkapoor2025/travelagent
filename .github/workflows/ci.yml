name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel
          POSTGRES_DB: travel_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Lint import check
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://travel:travel@localhost:5432/travel_ai
          DATABASE_URL_SYNC: postgresql://travel:travel@localhost:5432/travel_ai
          REDIS_URL: redis://localhost:6379/0
        run: python -c "from app.main import app; print('OK', app.title)"
