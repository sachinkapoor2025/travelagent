services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8001:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  init-dynamo:
    image: python:3.12-slim
    volumes:
      - ./scripts:/scripts
      - ./apps/api:/app
    working_dir: /app
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: me-central-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
    command: >
      bash -c "pip install -q boto3 && python /scripts/init_dynamo_local.py"
    depends_on:
      - dynamodb

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: dynamo
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: me-central-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      LEADS_TABLE: travel-ai-leads-dev
      BOOKINGS_TABLE: travel-ai-bookings-dev
      SESSIONS_TABLE: travel-ai-sessions-dev
      CONVERSATIONS_TABLE: travel-ai-conversations-dev
      PRICE_ALERTS_TABLE: travel-ai-price-alerts-dev
      EVENTS_TABLE: travel-ai-events-dev
      REFERRALS_TABLE: travel-ai-referrals-dev
      ITINERARIES_TABLE: travel-ai-itineraries-dev
    depends_on:
      init-dynamo:
        condition: service_completed_successfully
    volumes:
      - ./apps/api:/app/apps/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: dynamo
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: me-central-1
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      LEADS_TABLE: travel-ai-leads-dev
      BOOKINGS_TABLE: travel-ai-bookings-dev
      SESSIONS_TABLE: travel-ai-sessions-dev
      EVENTS_TABLE: travel-ai-events-dev
      PRICE_ALERTS_TABLE: travel-ai-price-alerts-dev
      REFERRALS_TABLE: travel-ai-referrals-dev
      ITINERARIES_TABLE: travel-ai-itineraries-dev
      CONVERSATIONS_TABLE: travel-ai-conversations-dev
    depends_on:
      init-dynamo:
        condition: service_completed_successfully
    command: python -m app.worker
